<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>ChatBot ESDACSF</title>

  <style>
    :root {
      --chat-primary: #4f46e5;
      --chat-primary-dark: #3730a3;
      --chat-bg: #0b1020;
      --chat-surface: #ffffff;
      --chat-border: #e5e7eb;
      --chat-shadow: 0 12px 30px rgba(0,0,0,.18);
      --chat-radius: 14px;
      --chat-font: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      font-family: var(--chat-font);
    }

    .chat-fab {
      position: fixed;
      right: 22px;
      bottom: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--chat-primary);
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: var(--chat-shadow);
      z-index: 9999;
    }

    .chat-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    .chatbox {
      position: fixed;
      right: 22px;
      bottom: 80px;
      width: 360px;
      height: 520px;
      background: var(--chat-surface);
      border-radius: var(--chat-radius);
      box-shadow: var(--chat-shadow);
      display: none;
      flex-direction: column;
      z-index: 9999;
      overflow: hidden;
    }

    .chatbox.open {
      display: flex;
    }

    .chatbox-header {
      background: var(--chat-bg);
      color: white;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chatbox-header button {
      background: transparent;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .chatbox-messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      background: #f8fafc;
    }

    .msg {
      max-width: 80%;
      padding: 10px 12px;
      margin: 6px 0;
      border-radius: 12px;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .msg.bot {
      background: white;
      border: 1px solid var(--chat-border);
    }

    .msg.user {
      background: var(--chat-primary);
      color: white;
      margin-left: auto;
    }

    .chatbox-input {
      border-top: 1px solid var(--chat-border);
      padding: 10px;
      display: flex;
      gap: 8px;
    }

    textarea {
      flex: 1;
      resize: none;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid var(--chat-border);
      font-family: inherit;
    }

    button.send {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: var(--chat-primary);
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<button class="chat-fab" id="chatFab">
  <img src="logo-chatbot.png" class="chat-logo" alt="Logo">
  <span>ChatBot ESDACSF</span>
</button>

<div class="chatbox" id="chatbox">
  <div class="chatbox-header">
    <strong>Assistente Escolar</strong>
    <button type="button" onclick="closeChat()">✖</button>
  </div>

  <div class="chatbox-messages" id="messages">
    <div class="msg bot">Olá! 👋 Sou o assistente virtual da escola.
Faz a tua pergunta.</div>
  </div>

  <form class="chatbox-input" id="chatForm">
    <textarea id="input" placeholder="Escreve a tua pergunta..."></textarea>
    <button class="send" type="submit">➤</button>
  </form>
</div>

<script>
  const chatFab = document.getElementById("chatFab");
  const chatbox = document.getElementById("chatbox");
  const form = document.getElementById("chatForm");
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");

  chatFab.onclick = () => chatbox.classList.add("open");

  function closeChat() {
    chatbox.classList.remove("open");
  }

  function addMessage(text, who) {
    const div = document.createElement("div");
    div.className = "msg " + who;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  let sessionId = localStorage.getItem("session_id");
  if (!sessionId) {
    sessionId = crypto.randomUUID();
    localStorage.setItem("session_id", sessionId);
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    try {
      const res = await fetch("http://127.0.0.1:5000/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          session_id: sessionId,
          message: text
        })
      });

      const data = await res.json();

      if (data.text) {
        addMessage(data.text, "bot");
      } else if (data.error) {
        addMessage("Erro: " + data.error, "bot");
      } else {
        addMessage("Não consegui responder.", "bot");
      }

    } catch (err) {
      addMessage("Erro ao ligar ao servidor.", "bot");
      console.error(err);
    }
  });
</script>

</body>
</html>
